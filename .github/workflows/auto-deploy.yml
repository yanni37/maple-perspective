name: Auto Deploy on push to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` here to avoid CI failing when package-lock.json
        # is out of sync on the repo. Recommended: update your lockfile locally
        # with `npm install` (Node 20) and commit the updated package-lock.json,
        # then revert this to `npm ci` for strictness.
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build (for GitHub Pages)
        run: npm run build:gh

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy 404.html for SPA routing
        run: |
          node -e "require('fs').copyFileSync('dist/maple-perspective/index.html','dist/maple-perspective/404.html')"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/maple-perspective
          publish_branch: gh-pages
          keep_files: false
