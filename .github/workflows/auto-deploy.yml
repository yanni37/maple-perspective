name: Auto Deploy on push to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` here to avoid CI failing when package-lock.json
        # is out of sync on the repo. Recommended: update your lockfile locally
        # with `npm install` (Node 20) and commit the updated package-lock.json,
        # then revert this to `npm ci` for strictness.
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build (for GitHub Pages)
        run: npm run build:gh

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish directory and copy 404.html
        id: prepare
        run: |
          set -e
          # Prefer top-level dist folder, fall back to browser/ if present
          if [ -f "dist/maple-perspective/index.html" ]; then
            PUBLISH_DIR="dist/maple-perspective"
            echo "Found index in $PUBLISH_DIR"
            cp "dist/maple-perspective/index.html" "dist/maple-perspective/404.html"
          elif [ -f "dist/maple-perspective/browser/index.html" ]; then
            PUBLISH_DIR="dist/maple-perspective/browser"
            echo "Found index in $PUBLISH_DIR"
            cp "dist/maple-perspective/browser/index.html" "dist/maple-perspective/browser/404.html"
          else
            echo "Build output not found. Listing dist:" >&2
            ls -al dist || true
            ls -al dist/maple-perspective || true
            exit 1
          fi
          echo "publish_dir=$PUBLISH_DIR" >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.prepare.outputs.publish_dir }}
          publish_branch: gh-pages
          keep_files: false
