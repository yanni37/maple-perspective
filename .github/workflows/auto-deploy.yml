name: Auto Deploy on push to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` here to avoid CI failing when package-lock.json
        # is out of sync on the repo. Recommended: update your lockfile locally
        # with `npm install` (Node 20) and commit the updated package-lock.json,
        # then revert this to `npm ci` for strictness.
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build (for GitHub Pages)
        run: npm run build:gh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/maple-perspective

  deploy:
    name: Deploy to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: ./publish

      - name: Copy 404.html for SPA routing
        run: cp ./publish/index.html ./publish/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          publish_branch: gh-pages
          keep_files: false
