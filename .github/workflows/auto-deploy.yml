name: Auto Deploy on push to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Test, Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Build (for GitHub Pages)
        run: npm run build:gh

      - name: Find build output and copy 404.html
        run: |
          set -e
          # Angular peut produire dist/maple-perspective ou dist/maple-perspective/browser
          if [ -f "dist/maple-perspective/browser/index.html" ]; then
            PUBLISH_DIR="dist/maple-perspective/browser"
          elif [ -f "dist/maple-perspective/index.html" ]; then
            PUBLISH_DIR="dist/maple-perspective"
          else
            echo "Erreur : index.html introuvable. Contenu de dist/ :" >&2
            find dist -type f | head -30 || true
            exit 1
          fi
          cp "$PUBLISH_DIR/index.html" "$PUBLISH_DIR/404.html"
          echo "PUBLISH_DIR=$PUBLISH_DIR" >> "$GITHUB_ENV"
          echo "Dossier de publication : $PUBLISH_DIR"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PUBLISH_DIR }}
          publish_branch: gh-pages
          keep_files: false
